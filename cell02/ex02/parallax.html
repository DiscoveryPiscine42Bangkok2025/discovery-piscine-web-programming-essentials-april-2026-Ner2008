<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body, html {
  margin: 0;
  height: 100%;
}

.parallax1 {
  background-image: url('capybara.jpg');
  height: 100vh;
  background-attachment: fixed;
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  position: relative;
}

.parallax2 {
  background-image: url('cat.jpeg');
  height: 100vh;
  background-attachment: fixed;
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  position: relative;
}

.text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 40px;
  text-align: center;
}

.content {
  height: 300px;
  background-color: black;
  color: white;
  font-size: 30px;
  display: flex;
  justify-content: center;
  align-items: center;
}
</style>
</head>

<body>

<div class="parallax1">
  <div class="text">Capybara</div>
</div>

<div class="content">
  I luv capybara
</div>

<div class="parallax2">
  <div class="text">Cat</div>
</div>

</body>
</html>
