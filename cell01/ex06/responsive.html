<!DOCTYPE html>
<html>
<head>
    <style>
        html, body {
            margin: 0;
            height: 100%;
        }

        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .yellow {
            background-color: yellow;
            border: 1px solid black;
            text-align: center;
            font-size: 24px;
        }

        .blue {
            background-color: blue;
            color: white;
            border: 1px solid black;
            text-align: center;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td class="yellow">Yellow</td>
            <td class="blue">Blue</td>
        </tr>
    </table>

</body>
</html>
