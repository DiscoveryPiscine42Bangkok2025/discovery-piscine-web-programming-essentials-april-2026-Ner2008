<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To Do List</title>

<style>
    body {
        font-family: Arial;
        text-align: center;
    }
    #ft_list {
        width: 300px;
        margin: 20px auto;
        border: 1px solid black;
        min-height: 100px;
        padding: 10px;
    }
    .todo {
        background: #f0f0f0;
        margin: 5px 0;
        padding: 10px;
        cursor: pointer;
    }
</style>
</head>

<body>

<button onclick="addTodo()">New</button>

<div id="ft_list"></div>

<script>
window.onload = function () {
    loadTodos();
};

function addTodo() {
    let text = prompt("Enter a new TO DO:");

    if (text && text.trim() !== "") {
        createTodo(text);
        saveTodos();
    }
}

function createTodo(text) {
    let div = document.createElement("div");
    div.className = "todo";
    div.textContent = text;

    div.onclick = function () {
        if (confirm("Do you want to delete this TO DO?")) {
            div.remove();
            saveTodos();
        }
    };

    let list = document.getElementById("ft_list");
    list.insertBefore(div, list.firstChild);
}

function saveTodos() {
    let todos = [];
    let items = document.querySelectorAll(".todo");

    items.forEach(item => {
        todos.push(item.textContent);
    });

    document.cookie = "todos=" + JSON.stringify(todos) + "; path=/";
}

function loadTodos() {
    let cookies = document.cookie.split("; ");
    let todoCookie = cookies.find(row => row.startsWith("todos="));

    if (todoCookie) {
        let data = JSON.parse(todoCookie.split("=")[1]);

        data.reverse().forEach(text => {
            createTodo(text);
        });
    }
}
</script>

</body>
</html>
