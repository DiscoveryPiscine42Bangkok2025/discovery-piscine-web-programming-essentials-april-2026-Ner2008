<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Balloon</title>

<style>
  #balloon {
    width: 200px;
    height: 200px;
    background-color: red;
    border-radius: 50%;
    margin: 100px auto;
  }
</style>
</head>

<body>

<div id="balloon"></div>

<script>
  let balloon = document.getElementById("balloon");

  let size = 200;
  let colors = ["red", "green", "blue"];
  let index = 0;

  balloon.onclick = function () {
    size += 10;
    index = (index + 1) % 3;

    if (size > 420) {
      size = 200;
      index = 0;
    }

    balloon.style.width = size + "px";
    balloon.style.height = size + "px";
    balloon.style.backgroundColor = colors[index];
  };

  balloon.onmouseleave = function () {
    size -= 5;
    if (size < 200) size = 200;

    index = (index - 1 + 3) % 3;

    balloon.style.width = size + "px";
    balloon.style.height = size + "px";
    balloon.style.backgroundColor = colors[index];
  };
</script>

</body>
</html>
