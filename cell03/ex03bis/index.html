<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>To Do List</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {font-family: Arial; text-align: center;}
#ft_list {width:300px; margin:20px auto; border:1px solid black; min-height:100px; padding:10px;}
.todo {background:#f0f0f0; margin:5px 0; padding:10px; cursor:pointer;}
</style>
</head>

<body>

<button id="btn">New</button>
<div id="ft_list"></div>

<script>
function save(){
let arr=[];
$(".todo").each(function(){arr.push($(this).text());});
document.cookie="todos="+JSON.stringify(arr)+"; path=/";
}

function load(){
let c=document.cookie.split("; ").find(x=>x.startsWith("todos="));
if(c){
JSON.parse(c.split("=")[1]).reverse().forEach(function(t){
$("#ft_list").prepend('<div class="todo">'+t+'</div>');
});
}
}

$("#btn").click(function(){
let t=prompt("Enter a new TO DO:");
if(t && t.trim()!=""){
$("#ft_list").prepend('<div class="todo">'+t+'</div>');
save();
}
});

$(document).on("click",".todo",function(){
if(confirm("Do you want to delete this TO DO?")){
$(this).remove();
save();
}
});

$(document).ready(function(){load();});
</script>

</body>
</html>
